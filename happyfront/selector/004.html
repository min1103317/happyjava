<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>CSS Selectors</title>
    <style>
      #container p {
        color: red;
      }
      #aa li {
        color: yellow;
      }
    </style>
  </head>
  <body>
    <div id="container">
      <p>My paragraph here.</p>
      <ul id="aa">
        <li>List Item 1</li>
        <li>List Item 2</li>
      </ul>

      <ul>
        <li class="warning">Something went Wrong</li>
        <li>List Item 4</li>
      </ul>
      <div>
        <p>div p test</p>
        <div>
          <p>div div p test</p>
        </div>
      </div>
    </div>

    <p>Paragraph outside of div</p>
  </body>
</html>
