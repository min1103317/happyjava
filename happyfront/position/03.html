<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>position3</title>
    <style>
      #wrap {
        position: relative;
        width: 300px;
        height: 300px;
        border: 1px solid black;
      }
      .box {
        position: absolute;
        width: 50px;
        height: 50px;
        background: #0094ff;
      }
      #crd1 {
        top: 10px;
        left: 10px;
      }
      #crd2 {
        top: 10px;
        right: 10px;
      }
      #crd3 {
        bottom: 10px;
        left: 10px;
      }
      #crd4 {
        bottom: 10px;
        right: 10px;
      }
      #crd5 {
        top: 125px;
        left: 125px;
      }
    </style>
  </head>
  <body>
    <div id="wrap">
      <div class="box" id="crd1">1</div>
      <div class="box" id="crd2">2</div>
      <div class="box" id="crd3">3</div>
      <div class="box" id="crd4">4</div>
      <div class="box" id="crd5">5</div>
    </div>
  </body>
</html>
