<!doctype html>
<html>
  <head>
    <title>CSS3 Style Property Basic</title>
    <style>
      /* 각  p 태그에 글자색을 각기 다르게 적용하고 싶어요.
        선택자 nth-child 이용해서 적용 해볼까요?
      */
      p:nth-child(1) {
        color: red;
      }

      p:nth-child(2) {
        color: blue;
      }

      p:nth-child(3) {
        color: green;
      }

      p:nth-child(4) {
        color: orange;
      }
    </style>
  </head>
  <body>
    <div>
      <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit.</p>
      <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit.</p>
      <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit.</p>
      <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit.</p>
    </div>
  </body>
</html>
