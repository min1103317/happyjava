<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>선택자의 종류</title>
    <style type="text/css">
      * {
        margin: 10;
        padding: 10;
      }
      /* border: 1px solid; */
      p {
        color: #4cf037;
      }

      .ptag {
        font-size: 20px;
      }

      .class-selector {
        font-size: 100px;
      }
      #type-selector {
        background-color: #ddd;
      }

      #aa {
        font-size: 30px;
      }
    </style>
  </head>
  <body>
    <div id="type-selector">
      <h1 id="aa" class="class-selector ptag bb cc abc">선택자란?</h1>
      <p class="ptag">
        선택자는 CSS에서 HTML의 특정 요소를 선택하기 위한 규칙입니다.
      </p>

      <p class="ptag cc abc">class 는 여러곳에서 같은 값을 사용할 수 있어요.</p>
    </div>
  </body>
</html>
